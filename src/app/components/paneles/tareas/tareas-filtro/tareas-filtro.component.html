<h2 class="titulo" mat-dialog-title>Filtros</h2>

<mat-dialog-content>

  <!-- Rango de fechas -->
  <mat-form-field appearance="outline">
    <mat-label>Rango de fechas</mat-label>
    <mat-date-range-input [formGroup]="range" [rangePicker]="picker">
      <input matStartDate formControlName="start" placeholder="Fecha de inicio"/>
      <input matEndDate formControlName="end" placeholder="Fecha de fin"/>
    </mat-date-range-input>
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-date-range-picker #picker></mat-date-range-picker>
  </mat-form-field>

  <!-- Autocomplete de activos -->
  <div class="activos-container">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Activos</mat-label>

      <input
        matInput
        [formControl]="activosCtrl"
        [matAutocomplete]="auto"
        placeholder="Buscar activo"
      />

      <mat-autocomplete
        #auto="matAutocomplete"
        (optionSelected)="addActivo($event)"
      >
        <!-- Seleccionar TODOS -->
        <mat-option (click)="selectAllActivos()">
          Todos
        </mat-option>

        <mat-option
          *ngFor="let activo of filteredActivos | async"
          [value]="activo"
        >
          {{ activo }}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>

    <!-- BOTÓN AFUERA -->
    <button
      mat-icon-button
      (click)="clearAllActivos()"
      matTooltip="Deseleccionar todo"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Activos seleccionados -->
  <div class="activos-selected">
    <div *ngFor="let activo of activosSelected" class="activo-item">
      {{ activo }}
      <button type="button" (click)="removeActivo(activo)">✕</button>
    </div>
  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="applyFilters()">Aplicar</button>
</mat-dialog-actions>
