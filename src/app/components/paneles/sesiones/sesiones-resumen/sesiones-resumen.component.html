<div class="container">
  <div class="support-requests-header">
    <div class="support-requests-title">
      {{ titulo }}
    </div>
  </div>

  <div class="table-container">
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="table">

        <!-- USER: NAME -->
        <ng-container *ngIf="tipo === 'user'" matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Usuario</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>

        <!-- DEVICE: CODE ASSET -->
        <ng-container *ngIf="tipo === 'device'" matColumnDef="code_assets">
          <th mat-header-cell *matHeaderCellDef>Activo</th>
          <td mat-cell *matCellDef="let row">{{ row.code_assets }}</td>
        </ng-container>

        <!-- DEVICE: SERIE -->
        <ng-container *ngIf="tipo === 'device'" matColumnDef="serie_number">
          <th mat-header-cell *matHeaderCellDef>Serie</th>
          <td mat-cell *matCellDef="let row">{{ row.serie_number }}</td>
        </ng-container>

        <!-- STATUS (AMBOS) -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let row">
            <span
              [ngClass]="{
                'text-connected': row.status === 'CONNECTED',
                'text-timeout': row.status === 'TIMEOUT',
                'text-disconnected': row.status === 'DISCONNECTED',
                'text-idle': row.status === 'IDLE'
              }"
            >
              {{ row.status }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns" class="table-header"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>
  </div>
</div>
